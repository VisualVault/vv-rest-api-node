name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "Build failed: dist/index.js not found" && exit 1)
          test -f dist/index.cjs || (echo "Build failed: dist/index.cjs not found" && exit 1)
          test -f dist/index.d.ts || (echo "Build failed: dist/index.d.ts not found" && exit 1)
          test -f dist/config.yml || (echo "Build failed: dist/config.yml not found" && exit 1)
          echo "Build output verified successfully."

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          cat <<'EOF' > .env
          VV_CLIENT_ID=${{ secrets.VV_CLIENT_ID }}
          VV_CLIENT_SECRET=${{ secrets.VV_CLIENT_SECRET }}
          VV_USERNAME=${{ secrets.VV_USERNAME }}
          VV_PASSWORD=${{ secrets.VV_PASSWORD }}
          VV_BASE_URL=${{ secrets.VV_BASE_URL }}
          VV_CUSTOMER_ALIAS=${{ secrets.VV_CUSTOMER_ALIAS }}
          VV_DATABASE_ALIAS=${{ secrets.VV_DATABASE_ALIAS }}
          VV_AUDIENCE=${{ secrets.VV_AUDIENCE }}
          EOF
          echo "${{ vars.ENV_TEST_VARS }}" >> .env

      - name: Run integration tests
        run: npm test
